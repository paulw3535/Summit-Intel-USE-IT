name: Scrape Summit County Leads

on:
  schedule:
    - cron: "0 7 * * *"      # 07:00 UTC daily  (3 AM ET)
  workflow_dispatch:          # manual trigger

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  scrape:
    name: Scrape & Publish
    runs-on: ubuntu-22.04

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Python ──────────────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      - name: Install Python dependencies
        run: pip install requests beautifulsoup4 lxml dbfread playwright

      - name: Install Playwright browsers
        run: python -m playwright install --with-deps chromium

      # ── Scrape ──────────────────────────────────────────────────────────────
      - name: Run scraper
        env:
          LOOKBACK_DAYS: "7"
        run: python scraper/fetch.py

      # ── Commit data files ────────────────────────────────────────────────────
      - name: Commit updated records
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard/records.json data/records.json data/ghl_export.csv || true
          git diff --staged --quiet || git commit -m "chore: update leads $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push

      # ── Deploy dashboard to GitHub Pages ─────────────────────────────────────
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
